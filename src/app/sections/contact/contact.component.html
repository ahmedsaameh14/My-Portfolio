<section id="contact" class="contact-section">
  <div class="blob"></div>
  <div class="blob"></div>

  <div class="floating-icon"><i class="bi bi-envelope-heart"></i></div>
  <div class="floating-icon"><i class="bi bi-chat-dots"></i></div>
  <div class="floating-icon"><i class="bi bi-telephone"></i></div>
  <div class="floating-icon"><i class="bi bi-person-lines-fill"></i></div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-6">
        <div class="contact-card">
          <div class="contact-header">
            <h2 class="contact-title">
              <i class="bi bi-send-fill me-2"></i>
              Get In <span>Touch</span>
            </h2>
            <p class="contact-subtitle">Have a project in mind? Let's build something amazing together.</p>
          </div>

          <div class="contact-form">
            <form action="https://formspree.io/f/xgvnnnop" method="POST" id="contactForm">
              
              <div class="form-group mb-4">
                <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
              </div>

              <div class="row">
                <div class="col-md-6 mb-4">
                  <div class="form-group">
                    <label class="form-label"><i class="bi bi-telephone"></i> Phone</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+20..." required>
                  </div>
                </div>
                <div class="col-md-6 mb-4">
                  <div class="form-group">
                    <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                  </div>
                </div>
              </div>

              <div class="form-group mb-4">
                <label class="form-label"><i class="bi bi-chat-text"></i> Message</label>
                <textarea name="message" class="form-control" rows="4" placeholder="How can I help you?" required></textarea>
              </div>

              <button type="submit" class="submit-btn">
                <span>Send Message</span>
                <i class="bi bi-arrow-right ms-2"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
